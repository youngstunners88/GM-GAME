name: Export Godot Game to Web

on:
  push:
    branches:
      - main
      - master
      - claude/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Godot 4.3.2
        run: |
          mkdir -p godot
          cd godot
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.3.2-stable/Godot_v4.3.2-stable_linux.x86_64.zip
          unzip -q Godot_v4.3.2-stable_linux.x86_64.zip
          chmod +x Godot_v4.3.2-stable_linux.x86_64
          ls -la
          cd ..
          echo "GODOT_BIN=$(pwd)/godot/Godot_v4.3.2-stable_linux.x86_64" >> $GITHUB_ENV

      - name: Create export directory and templates
        run: |
          mkdir -p web/game
          mkdir -p .godot/export_templates/4.3.2.stable

      - name: Create export presets
        run: |
          cat > export_presets.cfg << 'EOF'
          [preset.0]
          name="Web"
          platform="Web"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter="*.yml,*.yaml,*.md"
          export_path="web/game/index.html"
          script_export_mode=1
          script_encryption_key=""

          [preset.0.options]
          compression/enabled=true
          compression/algorithms/deflate/compression_level=9
          web/enable_cuda=false
          web/enable_vulkan=false
          web/use_threads=true
          web/threads_count=8
          EOF

      - name: Export game to Web
        run: |
          $GODOT_BIN --headless --export-release Web 2>&1 | tee export.log
          echo "=== Export Complete ==="
          ls -lh web/game/

      - name: Check export output
        run: |
          if [ -f "web/game/index.js" ] && [ -f "web/game/index.wasm" ]; then
            echo "✓ Web export successful"
            du -sh web/game/
          else
            echo "✗ Export failed - missing files"
            cat export.log
            exit 1
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: godot-export
          path: web/game/
          retention-days: 7

      - name: Commit exported files
        if: success()
        run: |
          git config --global user.name "Claude Code Bot"
          git config --global user.email "claude@anthropic.com"
          git add -f web/game/
          if ! git diff --cached --quiet; then
            git commit -m "build: export Godot 4.3 game to web (automated CI export)"
            git push -u origin HEAD 2>&1 || echo "Push failed - artifacts may be available"
          else
            echo "No changes to commit"
          fi

