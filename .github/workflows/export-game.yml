name: Export Godot Game to Web

on:
  push:
    branches:
      - main
      - master
      - claude/**
    paths:
      - 'src/**'
      - 'project.godot'
      - '.github/workflows/export-game.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GODOT_VERSION: "4.3-stable"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
          GITLEAKS_ENABLE_SUMMARY: true

      - name: Security Sentinel
        run: ./scripts/security-sentinel.sh --fail-on=high

      - name: Download Godot editor + export templates
        run: |
          set -euo pipefail
          mkdir -p godot
          cd godot

          EDITOR_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          TEMPLATES_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"

          SUMS_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/SHA512-SUMS.txt"

          echo "Downloading editor: $EDITOR_URL"
          curl -fL --retry 3 -o godot-editor.zip "$EDITOR_URL"

          # Supply-chain gate: verify both Godot downloads against the release's
          # official SHA512 sums before executing anything (audit finding #6).
          # Missing sums file = warn (release layout changed); MISMATCH = fail.
          # Plain shell var, NOT $GITHUB_ENV: verify() runs in THIS same shell,
          # and $GITHUB_ENV only propagates to *later* steps — so a missing sums
          # file must be recorded here or verify() would still grep a nonexistent
          # file and fail the export instead of skipping the gate as intended.
          SUMS_MISSING=0
          if ! curl -fL --retry 3 -o SHA512-SUMS.txt "$SUMS_URL"; then
            echo "::warning::SHA512-SUMS.txt not found on release — skipping Godot checksum gate"
            SUMS_MISSING=1
          fi
          verify() {
            [ "$SUMS_MISSING" = "1" ] && return 0
            local file=$1 name=$2
            local expected actual
            expected=$(grep " ${name}\$" SHA512-SUMS.txt | awk '{print $1}')
            if [ -z "$expected" ]; then
              echo "::error::No checksum for $name in SHA512-SUMS.txt"; exit 1
            fi
            actual=$(sha512sum "$file" | awk '{print $1}')
            if [ "$expected" != "$actual" ]; then
              echo "::error::Checksum mismatch for $name"; exit 1
            fi
            echo "✓ checksum OK: $name"
          }
          verify godot-editor.zip "Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q godot-editor.zip
          EDITOR_BIN=$(find . -maxdepth 1 -name "Godot_v*_linux.x86_64" -type f | head -1)
          chmod +x "$EDITOR_BIN"
          echo "GODOT_BIN=$(pwd)/$EDITOR_BIN" >> "$GITHUB_ENV"

          echo "Downloading export templates: $TEMPLATES_URL"
          curl -fL --retry 3 -o templates.tpz "$TEMPLATES_URL"
          verify templates.tpz "Godot_v${GODOT_VERSION}_export_templates.tpz"

          # Templates must live at ~/.local/share/godot/export_templates/<version>/
          # NOTE: Godot names the dir "4.3.stable" (dot), not the release tag "4.3-stable".
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION/-/.}"
          mkdir -p "$TEMPLATE_DIR"
          unzip -q templates.tpz -d /tmp/templates_extract
          # The tpz extracts into a "templates/" folder
          cp -r /tmp/templates_extract/templates/* "$TEMPLATE_DIR/"
          echo "Templates installed to $TEMPLATE_DIR:"
          ls "$TEMPLATE_DIR" | head -5

      - name: Verify Godot runs
        run: |
          "$GODOT_BIN" --version

      - name: Create export preset
        run: |
          mkdir -p web/game .godot/editor
          cat > export_presets.cfg << 'EOF'
          [preset.0]
          name="Web"
          platform="Web"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          # config.json is a plain (non-resource) file the Web3Bridge autoload
          # reads at runtime via res://config.json — it must be force-included or
          # the Movie/Video-Game Layer wiring (contracts, backend URL) is absent
          # in the exported build.
          include_filter="config.json"
          exclude_filter="*.yml,*.yaml,*.md"
          export_path="web/game/index.html"
          script_export_mode=1
          script_encryption_key=""

          [preset.0.options]
          custom_template/debug=""
          custom_template/release=""
          variant/extensions_support=false
          # Non-threaded export: no SharedArrayBuffer/COOP/COEP requirement, so the
          # game boots on itch.io, iframes, and mobile browsers without special headers.
          variant/thread_support=false
          vram_texture_compression/for_desktop=true
          vram_texture_compression/for_mobile=false
          html/export_icon=true
          html/custom_html_shell=""
          # Load the browser-side Web3 bridge (web/web3.js, copied next to
          # index.html after export) so window.LilBluntWeb3 exists before the
          # engine boots. Plain window.ethereum, no external CDN — CSP/itch safe.
          html/head_include="<script src=\"web3.js\"></script>"
          html/canvas_resize_policy=2
          html/focus_canvas_on_start=true
          html/experimental_virtual_keyboard=false
          progressive_web_app/enabled=false
          EOF

      - name: Import project (first pass)
        run: |
          # Exporting before the initial resource import settles can fail with a
          # blank "configuration errors" message — import in a separate pass first.
          timeout 300 "$GODOT_BIN" --headless --editor --quit 2>&1 | tee import.log | tail -20 || true
          # A corrupt project.godot silently truncates ProjectSettings in the
          # export (this is how the entire [input] section once vanished).
          # Fail loudly instead of shipping a broken pck.
          if grep -E "Error parsing .*project.godot|Couldn't load file .*project.godot" import.log; then
            echo "::error::project.godot failed to parse — aborting export"
            exit 1
          fi

      - name: Export game to Web
        run: |
          "$GODOT_BIN" --headless --verbose --export-release "Web" web/game/index.html 2>&1 | tee export.log | tail -60
          echo "=== web/game/ contents ==="
          ls -lh web/game/ || true

      - name: Verify export output
        run: |
          if [ -f "web/game/index.js" ] && [ -f "web/game/index.wasm" ]; then
            echo "✓ Export successful"
            du -sh web/game/*
          else
            echo "✗ Export failed — see log below"
            cat export.log
            exit 1
          fi

      - name: Bundle browser Web3 bridge (Layer Shift)
        run: |
          # index.html's head_include references web3.js by relative path, so the
          # file must sit next to it in the deployed dir. Fail loudly if missing —
          # a dangling <script src> would silently disable all Movie/VG-Layer
          # wallet features in the shipped build.
          if [ ! -f web/web3.js ]; then
            echo "::error::web/web3.js missing — Web3 bridge would 404 in the build"
            exit 1
          fi
          cp web/web3.js web/game/web3.js
          echo "✓ web3.js bundled into web/game/"

      # Commit the fresh export BEFORE the itch deploy. The itch.io upload can
      # fail on external gates (e.g. account-email verification) that have
      # nothing to do with the build; if the commit ran after butler with
      # `if: success()` it would be skipped on those failures, leaving the
      # committed web/game (which the Vercel mirror serves) permanently stale.
      # web/game/** is not in this workflow's trigger paths, so this commit
      # does not kick off another run.
      - name: Commit exported files
        if: success()
        run: |
          git config --global user.name "Claude Code Bot"
          git config --global user.email "claude@anthropic.com"
          git add -f web/game/
          if ! git diff --cached --quiet; then
            git commit -m "build: export Godot 4.3 game to web (automated CI)"
            # The branch may have moved while this job ran (e.g. a dev push) —
            # rebase our export commit on top instead of failing the run.
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push -u origin HEAD
          else
            echo "No changes to commit"
          fi

      # Branded-domain mirror: gh-pages serves the build at
      # https://mnguniproject.co.za/GM-GAME/ (the owner's Cloudflare-proxied
      # GitHub Pages domain) once Pages is enabled on this repo. A fresh
      # single-commit branch each run — it's a generated artifact, history
      # is meaningless there, and this keeps the repo from bloating.
      - name: Refresh gh-pages mirror
        if: success()
        run: |
          cd web/game
          touch .nojekyll
          git init -qb gh-pages
          git add -A
          git -c user.name="Claude Code Bot" -c user.email="claude@anthropic.com" \
            commit -qm "pages: web build @ ${GITHUB_SHA::7}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}" gh-pages
          rm -rf .git
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Upload artifacts (always, for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: godot-web-export
          path: |
            web/game/
            export.log
          retention-days: 7

      - name: Package itch.io build (index.html at zip root)
        if: success()
        run: |
          cd web/game
          zip -r ../../lil-blunt-itch.zip .
          cd ../..
          ls -lh lil-blunt-itch.zip

      - name: Upload itch.io-ready zip (manual-upload fallback)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: itch-build
          path: lil-blunt-itch.zip
          retention-days: 14

      - name: Deploy to itch.io via butler
        if: success()
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
          # itch.io target: <username>/<game-slug>:<channel>
          ITCH_TARGET: youngstunners88/lil-blunt-adventure:html5
        run: |
          if [ -z "$BUTLER_API_KEY" ]; then
            echo "::notice::BUTLER_API_KEY secret not set — skipping itch.io deploy."
            echo "Add it at Settings → Secrets → Actions, key from https://itch.io/user/settings/api-keys"
            exit 0
          fi
          # Pinned butler + checksum: this step holds BUTLER_API_KEY, so never
          # execute an unpinned "LATEST" binary here (audit finding #6).
          BUTLER_VERSION="15.28.0"
          BUTLER_SHA256="746de1eb9e0b8aba2b8aa766d3cfeacd92d69bcf06acf571a5b9a0faf28e3733"
          curl -fL --retry 3 -o butler.zip \
            "https://broth.itch.zone/butler/linux-amd64/${BUTLER_VERSION}/archive/default"
          echo "${BUTLER_SHA256}  butler.zip" | sha256sum -c -
          unzip -q butler.zip butler
          chmod +x butler
          ./butler push web/game "$ITCH_TARGET" \
            --userversion "$(git rev-parse --short HEAD)-$(date -u +%Y%m%d%H%M)"
          echo "::notice::Pushed to https://youngstunners88.itch.io/lil-blunt-adventure"
