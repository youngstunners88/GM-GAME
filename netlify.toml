[build]
  publish = "web"
  command = "echo 'No build step — static site'"

[build.environment]
  NODE_VERSION = "18"

# Redirect root to the launcher
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# Serve the Godot game directory without SPA fallback
[[redirects]]
  from = "/game/*"
  to = "/game/:splat"
  status = 200
  force = false

# Headers for Godot web export (SharedArrayBuffer / WASM threads requirement)
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Embedder-Policy = "require-corp"
    Cross-Origin-Opener-Policy = "same-origin"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/game/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/game/*.wasm"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "application/wasm"

[[headers]]
  for = "/game/*.pck"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Netlify deploy contexts
[context.production]
  command = "echo 'Production deploy'"

[context.deploy-preview]
  command = "echo 'Deploy preview'"
