name = "lil-blunt-backend"
main = "worker.js"
compatibility_date = "2024-11-01"

# Bind a KV namespace for leaderboard / lore / funnel analytics.
# Create it once:  wrangler kv:namespace create GAME_KV
# then paste the id below.
[[kv_namespaces]]
binding = "GAME_KV"
id = "72e338d4f89b4a9d8e3de967f12928d8"

# Secret (do NOT put it here — it's committed): set it out-of-band with
#   wrangler secret put MISTRAL_API_KEY
# The Worker reads it as env.MISTRAL_API_KEY.

# CORS allow-list (checklist F3). "*" is the local-dev default baked into the
# Worker; SET THIS to the game's real origins before production, e.g.:
#   ALLOWED_ORIGIN = "https://html-classic.itch.zone,https://lil-blunt-game.vercel.app"
[vars]
PUBLIC_BACKEND_URL = "https://lil-blunt-backend.teacherchris37.workers.dev"
ALLOWED_ORIGIN = "*"
SENDER_INBOX_ID = "smokering-notifications@agentmail.to"
SUPPORT_INBOX_ID = "smokering-notifications@agentmail.to"
ADMIN_EMAIL = "teacherchris37@gmail.com"
POSTAL_ADDRESS = "SmokeRing - The Smoke Realm (update with mailing address)"
DIGEST_DRAFT_ONLY = "1"
# ALLOWED_ORIGIN = ""
# --- AgentMail marketing engine (AGENTMAIL_SETUP.md) ---
# Secrets, set out-of-band (NEVER here):
#   wrangler secret put AGENTMAIL_API_KEY
#   wrangler secret put WEBHOOK_SECRET       # gates /agentmail/webhook + /email/preview
#   wrangler secret put XAI_API_KEY          # optional LLM fallback for support triage
#   wrangler secret put OPENROUTER_API_KEY   # Kimi K3 tier: support triage fallback +
#                                            # weekly realm-news blurb (1 call/week)
# Plain vars (fill in after AgentMail setup):
# AGENTMAIL_DOMAIN = "smokering.game"        # custom sending domain
# ADMIN_EMAIL = ""                           # founder's inbox for the Monday digest
# SUPPORT_INBOX_ID = ""                      # AgentMail inbox id for support@
# SENDER_INBOX_ID = ""                       # AgentMail inbox id for notifications@
# PUBLIC_BACKEND_URL = ""                    # this worker's public URL (for links)
# POSTAL_ADDRESS = ""                        # CAN-SPAM physical address for footers
# DIGEST_DRAFT_ONLY = "0"                    # "1" = pause digests at Draft stage for review

# Email cron: Mondays 10:00 UTC = weekly player digests + founder digest;
# daily 09:00 UTC = welcome-sequence steps + referral follow-ups.
[triggers]
crons = ["0 10 * * 1", "0 9 * * *"]
